# Generate 2 AI blog posts once per day (1 run/day to save API cost).
# Requires: PERPLEXITY_API_KEY or GROQ_API_KEY / GEMINI_API_KEY in repo Secrets.
# Runs at 00:30 UTC (≈ 6am IST).
name: Generate Daily Blog
permissions:
  contents: write
on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC ≈ 6am IST (once per day)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot (scheduled run uses 6am)'
        required: false
        default: '6am'
        type: choice
        options:
          - '6am'
          - '6pm'
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Resolve slot for scheduled run
        id: slot
        run: |
          echo "slot=6am" >> $GITHUB_OUTPUT
          echo "Resolved slot: 6am (once per day)"

      - name: Check API secrets (Groq, Perplexity or Gemini)
        run: |
          GROQ="${{ secrets.GROQ_API_KEYS }}${{ secrets.GROQ_API_KEY }}"
          PERP="${{ secrets.PERPLEXITY_API_KEYS }}${{ secrets.PERPLEXITY_API_KEY }}"
          GEM="${{ secrets.GEMINI_API_KEY }}${{ secrets.API_KEY }}"
          if [ -z "$GROQ" ] && [ -z "$PERP" ] && [ -z "$GEM" ]; then
            echo "::error::Set GROQ_API_KEY, PERPLEXITY_API_KEY (or PERPLEXITY_API_KEYS) and/or GEMINI_API_KEY (or API_KEY) in repo Secrets."
            exit 1
          fi
          echo "API key(s) are set (Groq, Perplexity and/or Gemini for fallback)."

      - name: Generate daily blog posts
        run: node scripts/generate-daily-blog.mjs ${{ github.event.inputs.slot || steps.slot.outputs.slot }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_API_KEYS: ${{ secrets.PERPLEXITY_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Generate blog embeddings (once per day to save cost)
        continue-on-error: true
        run: |
          SLOT="${{ github.event.inputs.slot || steps.slot.outputs.slot }}"
          if [ "$SLOT" = "6am" ]; then
            npm run blog:embeddings
          else
            echo "Skipping embeddings (run only at 6am slot to save embedding API cost)."
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blog/daily-posts.json public/blog/feed.xml public/blog/sitemap-blog.xml public/blog/sitemap-news.xml public/blog/images/
          if [ -f public/blog/daily-posts-embeddings.json ]; then
            git add public/blog/daily-posts-embeddings.json
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily AI blog posts (${{ github.event.inputs.slot || steps.slot.outputs.slot || '6am' }}), RSS feed and blog sitemap"
            git fetch origin main
            git pull origin main --no-rebase --no-edit -X ours
            git push origin main
          fi
