# Generate one AI video per day (Veo via Gemini API) to save cost.
# Runs once per day at 02:00 UTC; produces a single video for that day (slot 2am).
# Requires: GEMINI_API_KEY (or API_KEY) in repo Secrets.
name: Generate Daily AI Video
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot (scheduled runs use 2am)'
        required: false
        default: '2am'
        type: choice
        options:
          - '2am'
          - '7am'
          - '11am'
          - '2pm'
          - '5pm'
          - '7pm'
          - '10pm'
          - '12am'
  schedule:
    # One run per day at 02:00 UTC
    - cron: '0 2 * * *'
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check Gemini API key
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}${{ secrets.API_KEY }}" ]; then
            echo "::error::Set GEMINI_API_KEY or API_KEY in repo Secrets for video generation."
            exit 1
          fi
          echo "Gemini API key is set."

      - name: Generate one AI video (daily)
        run: node scripts/generate-daily-video.mjs ${{ github.event.inputs.slot || '2am' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Commit and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blog/daily-videos.json public/blog/videos/
          if git diff --staged --quiet; then
            echo "No changes to commit (video or manifest may already exist for this date)."
            ls -la public/blog/videos/ 2>/dev/null || true
            cat public/blog/daily-videos.json 2>/dev/null || true
          else
            git commit -m "chore: add daily AI video (one per day)"
            git fetch origin "$BRANCH"
            git pull origin "$BRANCH" --no-rebase --no-edit -X ours
            git push origin "HEAD:$BRANCH"
          fi
