name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (root + server)
        run: |
          rm -rf node_modules package-lock.json
          npm install
          cd server && npm install && cd ..

      # Run backend so we verify it starts; then build frontend. Pass secrets so the server has API keys (otherwise it logs "No Gemini key" / "No ASTROLOGY_API_KEYS").
      - name: Start backend and wait for health
        env:
          PORT: 3001
          API_KEY: ${{ secrets.API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.API_KEY || '' }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.API_KEYS || '' }}
          GEMINI_TIER: ${{ secrets.GEMINI_TIER || secrets.VITE_GEMINI_TIER || '0' }}
          ASTROLOGY_API_KEYS: ${{ secrets.ASTROLOGY_API_KEYS || secrets.VITE_ASTROLOGY_API_KEYS || '' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || secrets.VITE_GOOGLE_API_KEY || '' }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY || '' }}
        run: |
          cd server && node index.js &
          echo "Waiting for backend at http://localhost:3001..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              echo "Backend is up."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend did not become ready in time."
              exit 1
            fi
            sleep 1
          done

      - name: Build frontend
        run: npm run build
        env:
          # Backend: set VITE_API_BASE_URL in Secrets to one backend URL (no trailing slash). Examples: https://cosmicjyoti.onrender.com or https://cosmicjyoti-cw3xpp2qxq-ew.a.run.app
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || '' }}
          API_KEY: ${{ secrets.API_KEY || '' }}
          API_KEYS: ${{ secrets.API_KEYS || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.API_KEY || '' }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.API_KEYS || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || secrets.GEMINI_API_KEY || secrets.API_KEY || '' }}
          VITE_GEMINI_API_KEYS: ${{ secrets.VITE_GEMINI_API_KEYS || secrets.GEMINI_API_KEYS || secrets.API_KEYS || '' }}
          GEMINI_FALLBACK_KEY: ${{ secrets.GEMINI_FALLBACK_KEY || '' }}
          PERPLEXITY_API_KEYS: ${{ secrets.PERPLEXITY_API_KEYS || secrets.PERPLEXITY_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS || secrets.GROQ_API_KEY || '' }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY || '' }}
          VITE_PROFILE_SUBMIT_URL: ${{ secrets.VITE_PROFILE_SUBMIT_URL || '' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || '' }}
          # Gemini tier (free | paid): paid uses high-quota models first to stay within RPM/TPM/RPD.
          GEMINI_TIER: ${{ secrets.GEMINI_TIER || secrets.VITE_GEMINI_TIER || '0' }}
          VITE_GEMINI_TIER: ${{ secrets.VITE_GEMINI_TIER || secrets.GEMINI_TIER || '0' }}
          # Kundali (birth chart): set ASTROLOGY_API_KEYS or VITE_ASTROLOGY_API_KEYS (comma-separated keys from freeastrologyapi.com).
          ASTROLOGY_API_KEYS: ${{ secrets.ASTROLOGY_API_KEYS || secrets.VITE_ASTROLOGY_API_KEYS || '' }}
          VITE_ASTROLOGY_API_KEYS: ${{ secrets.VITE_ASTROLOGY_API_KEYS || secrets.ASTROLOGY_API_KEYS || '' }}
          # Optional: only if sync uses a different URL than the backend (e.g. separate sync service). When VITE_API_BASE_URL is set, sync uses that backend.
          VITE_SYNC_API_URL: ${{ secrets.VITE_SYNC_API_URL || '' }}
          # Use relative base so assets load at any path (e.g. .../CosmicJyoti/ or custom domain root).
          VITE_BASE_URL: ./
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
